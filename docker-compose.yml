services:
  app:
    build: .
    container_name: corfiem_app
    ports:
      - "80:8080"
    environment:
      APP_URL: http://localhost
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: corfiem_db
      DB_USER: postgres
      DB_PASS: postgres        # cambiar en producción
      AI_ENABLED: "false"
      CLAUDE_API_KEY: ""
    volumes:
      - uploads_data:/var/www/html/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: corfiem_db
    environment:
      POSTGRES_DB: corfiem_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres   # cambiar en producción
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d corfiem_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  uploads_data:
  postgres_data:
